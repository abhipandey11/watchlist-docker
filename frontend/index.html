<!DOCTYPE html>
<html>
<head>

<title>Watchlist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between mb-4">
<h2>🎬 Watchlist Manager</h2>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

<div class="card p-3 shadow mb-4">

<div class="row g-2">

<div class="col-md-6">
<input id="title" class="form-control" placeholder="Enter title">
</div>

<div class="col-md-4">
<select id="type" class="form-select">
<option>Movie</option>
<option>Book</option>
<option>Drama</option>
</select>
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="addItem()">Add</button>
</div>

</div>

</div>

<div class="row">

<div class="col-md-4">
<h4 class="text-center">🎬 Movies</h4>
<div id="movies"></div>
</div>

<div class="col-md-4">
<h4 class="text-center">📚 Books</h4>
<div id="books"></div>
</div>

<div class="col-md-4">
<h4 class="text-center">📺 Dramas</h4>
<div id="dramas"></div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
