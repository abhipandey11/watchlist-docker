<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Watchlist Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
}

.app-title{
font-weight:700;
}

.list-group-item{
transition: all 0.2s ease;
}

.list-group-item:hover{
transform:scale(1.02);
background:#f8f9fa;
}

.counter{
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4 app-title">
<i class="fa-solid fa-film"></i> Watchlist Manager
</h1>

<div class="card shadow p-4 mb-5">

<div class="row g-3">

<div class="col-md-6">
<input id="title" class="form-control" placeholder="Enter title">
</div>

<div class="col-md-4">
<select id="type" class="form-select">
<option>Movie</option>
<option>Book</option>
<option>Drama</option>
</select>
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="addItem()">
<i class="fa-solid fa-plus"></i> Add
</button>
</div>

</div>

</div>

<div class="row">

<div class="col-md-4">

<h4 class="text-center">
🎬 Movies
<span class="counter" id="movieCount">(0)</span>
</h4>

<ul id="movies" class="list-group"></ul>

</div>

<div class="col-md-4">

<h4 class="text-center">
📚 Books
<span class="counter" id="bookCount">(0)</span>
</h4>

<ul id="books" class="list-group"></ul>

</div>

<div class="col-md-4">

<h4 class="text-center">
📺 Dramas
<span class="counter" id="dramaCount">(0)</span>
</h4>

<ul id="dramas" class="list-group"></ul>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
